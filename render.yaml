services:
  - type: web
    name: talentmatch-ai
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: ./data/talentmatch.sqlite
      - key: UPLOAD_DIR
        value: ./uploads
